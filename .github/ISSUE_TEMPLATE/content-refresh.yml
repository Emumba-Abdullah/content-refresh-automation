name: Content Refresh
description: Run the content refresh automation pipeline
title: "Content Refresh"
labels: ["content-refresh"]
body:
  - type: markdown
    attributes:
      value: |
        Open this issue to trigger the content refresh automation.

  - type: input
    id: candidate_limit
    attributes:
      label: Candidate limit
      description: >
        Optional — controls how many HIGH-scoring candidates are sent to the LLM for classification
        and how many PRs are created in this run. Defaults to 1 if not provided.
        Increase carefully: each candidate costs an LLM call and opens a PR in the destination repo.
      placeholder: "1"
    validations:
      required: false

  - type: textarea
    id: user_urls
    attributes:
      label: Additional URLs
      description: Optional — add one or more URLs to scrape and classify alongside the standard sources (one URL per line).
      placeholder: |
        https://learn.microsoft.com/en-us/azure/postgresql/...
        https://techcommunity.microsoft.com/...
    validations:
      required: false
