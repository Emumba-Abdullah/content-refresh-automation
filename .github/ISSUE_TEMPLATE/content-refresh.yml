name: Content Refresh
description: Run the content refresh automation pipeline
title: "Content Refresh"
labels: ["content-refresh"]
body:
  - type: markdown
    attributes:
      value: |
        Open this issue to trigger the content refresh automation.

  - type: input
    id: source_scope
    attributes:
      label: Source scope
      description: Optional source scope, for example microsoft-learn
      placeholder: microsoft-learn
    validations:
      required: false

  - type: input
    id: candidate_limit
    attributes:
      label: Candidate limit
      description: Optional max number of candidates to process in this run
      placeholder: "20"
    validations:
      required: false
